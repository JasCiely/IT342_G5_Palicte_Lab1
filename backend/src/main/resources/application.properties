# Application
spring.application.name=backend

# Allow circular references temporarily
spring.main.allow-circular-references=true

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/lab1?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=123456

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Security - Session Configuration
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
# IMPORTANT: Set to true in production (requires HTTPS):
# server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=lax

# Prevent session fixation attacks
server.servlet.session.tracking-modes=cookie

# Logging Configuration
logging.level.org.springframework.security=DEBUG
logging.level.com.backend=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE